<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味翻翻樂遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 卡片翻轉的 3D 效果 */
        .card-perspective {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-700 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-md w-full text-center space-y-6">
        
        <header class="flex justify-between items-center bg-slate-100 p-3 rounded-xl font-bold text-slate-700">
            <div>⏱️ 時間: <span id="timer" class="text-indigo-600">0</span> 秒</div>
            <div>🔢 翻牌步數: <span id="moves" class="text-indigo-600">0</span></div>
        </header>

        <main id="game-board" class="grid grid-cols-4 gap-3 card-perspective auto-rows-max">
            </main>

        <footer>
            <button id="restart-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-md cursor-pointer">
                🔄 重新開始遊戲
            </button>
        </footer>
    </div>

    <div id="win-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center hidden p-4 animate-fade-in">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
            <h2 class="text-3xl font-black text-amber-500">🎉 恭喜通關！</h2>
            <p class="text-slate-600 font-medium">你成功的把所有卡片都配對成功了！</p>
            <div class="bg-slate-50 p-3 rounded-xl space-y-1 text-slate-700 font-bold">
                <p>總花費時間: <span id="final-time" class="text-indigo-600">0</span> 秒</p>
                <p>總翻牌步數: <span id="final-moves" class="text-indigo-600">0</span> 次</p>
            </div>
            <button id="modal-close-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl transition cursor-pointer">
                再玩一局 🎮
            </button>
        </div>
    </div>

    <script>
        // 遊戲圖案設定 (8種動物，各2張，共16張)
        const emojis = ['🐶', '🐱', '🦁', '🦊', '🐷', '🐸', '🐵', '🐼', '🐶', '🐱', '🦁', '🦊', '🐷', '🐸', '🐵', '🐼'];
        
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let isLockBoard = false; // 防止玩家連續快速點擊第3張牌

        const gameBoard = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const timerDisplay = document.getElementById('timer');
        const winModal = document.getElementById('win-modal');

        // 1. 洗牌演算法 (Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 2. 計時器控制
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timer = 0;
            timerDisplay.textContent = timer;
            timerInterval = setInterval(() => {
                timer++;
                timerDisplay.textContent = timer;
            }, 1000);
        }

        // 3. 初始化/重置遊戲
        function initGame() {
            gameBoard.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            moves = 0;
            movesDisplay.textContent = moves;
            winModal.classList.add('hidden');
            isLockBoard = false;
            
            startTimer();

            // 洗牌圖案
            const shuffledEmojis = shuffle([...emojis]);

            // 動態產生 16 張卡片的 HTML 結構
            shuffledEmojis.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'w-full h-20 sm:h-24 cursor-pointer card-perspective';
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-inner w-full h-full relative rounded-xl shadow-xs border border-slate-200">
                        <div class="card-front absolute inset-0 bg-slate-200 hover:bg-slate-300 flex items-center justify-center text-2xl rounded-xl transition">❓</div>
                        <div class="card-back absolute inset-0 bg-indigo-100 flex items-center justify-center text-3xl rounded-xl">
                            ${emoji}
                        </div>
                    </div>
                `;

                // 綁定點擊事件
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        // 4. 點擊翻牌邏輯
        function flipCard() {
            if (isLockBoard) return; // 如果板面鎖定中，不允許點擊
            const innerCard = this.querySelector('.card-inner');

            // 避免重複點擊已經翻開或已經配對成功的卡片
            if (innerCard.classList.contains('card-flipped') || this.classList.contains('matched')) return;

            // 翻轉卡片
            innerCard.classList.add('card-flipped');
            flippedCards.push(this);

            // 當翻了兩張牌，進行比對
            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                checkMatch();
            }
        }

        // 5. 檢查兩張牌是否相同
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.emoji === card2.dataset.emoji;

            if (isMatch) {
                // 配對成功
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                // 幫配對成功的卡片加上亮綠色外框與小動畫
                [card1, card2].forEach(c => {
                    setTimeout(() => {
                        c.querySelector('.card-inner').classList.remove('border-slate-200');
                        c.querySelector('.card-inner').classList.add('border-emerald-400', 'bg-emerald-50');
                    }, 300);
                });

                matchedCount += 2;
                flippedCards = [];

                // 檢查是否全部通關
                if (matchedCount === emojis.length) {
                    clearInterval(timerInterval);
                    setTimeout(showWinModal, 500);
                }
            } else {
                // 配對失敗，鎖定板面並在 1 秒後把牌蓋回去
                isLockBoard = true;
                setTimeout(() => {
                    card1.querySelector('.card-inner').classList.remove('card-flipped');
                    card2.querySelector('.card-inner').classList.remove('card-flipped');
                    flippedCards = [];
                    isLockBoard = false;
                }, 1000);
            }
        }

        // 6. 顯示勝利視窗
        function showWinModal() {
            document.getElementById('final-time').textContent = timer;
            document.getElementById('final-moves').textContent = moves;
            winModal.classList.remove('hidden');
        }

        // 綁定按鈕事件
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('modal-close-btn').addEventListener('click', initGame);

        // 網頁載入後自動開始第一局
        initGame();
    </script>
</body>
</html>
